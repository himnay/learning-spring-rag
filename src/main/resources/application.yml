spring:
  application:
    name: nexacorp-ai-backend
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/nexacorp_knowledge
    username: nexa
    password: nexa
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration

